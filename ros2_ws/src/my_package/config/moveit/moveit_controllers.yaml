/**:
  ros__parameters:
    moveit_simple_controller_manager:
      controller_names:
        - joint_trajectory_controller
        - gripper_controller

      joint_trajectory_controller:
        type: FollowJointTrajectory
        action_ns: follow_joint_trajectory
        default: true
        joints:
          - shoulder_joint
          - elbow_joint
          - wrist_joint

      gripper_controller:
        type: GripperCommand
        action_ns: gripper_cmd
        default: true
        joints:
          - left_finger_joint